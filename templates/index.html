<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WeatherDash | Real-Time Weather & Forecast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            color: #f1f5f9;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #94a3b8;
            margin-top: 0.5rem;
        }

        /* Search Box */
        .search-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid #334155;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.8rem 1.2rem;
            border-radius: 50px;
            border: none;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
            border: 1px solid #334155;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.3);
        }

        .search-btn {
            background: #3b82f6;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            display: none;
        }

        .spinner {
            border: 3px solid #334155;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            color: #fca5a5;
            margin-bottom: 1rem;
            display: none;
        }

        /* Weather Cards */
        .weather-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid #334155;
        }

        .city-name {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }

        .city-name img {
            width: 48px;
            height: 48px;
        }

        .temp {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0.5rem 0;
        }

        .details {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 1rem;
            color: #cbd5e1;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Forecast */
        .forecast-title {
            font-size: 1.5rem;
            margin: 1.5rem 0 1rem;
            font-weight: 600;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .forecast-day {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s;
        }

        .forecast-day:hover {
            transform: translateY(-4px);
            background: rgba(59, 130, 246, 0.2);
        }

        .forecast-date {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .forecast-temp {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .forecast-condition {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .cached-badge {
            display: inline-block;
            background: #334155;
            border-radius: 20px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            margin-top: 0.5rem;
            color: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .temp { font-size: 2.5rem; }
            .city-name { font-size: 1.5rem; }
            .forecast-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌤️ WeatherDash</h1>
        <p>Real-time weather & 5-day forecast | Powered by OpenWeather</p>
    </div>

    <div class="search-card">
        <input type="text" id="cityInput" class="search-input" placeholder="Enter city name e.g., London, Karachi, New York" autocomplete="off">
        <button id="searchBtn" class="search-btn"><span>🔍</span> Search</button>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Fetching weather data...</p>
    </div>

    <div id="error" class="error"></div>

    <div id="weatherContent" style="display: none;"></div>
</div>

<script>
    const searchBtn = document.getElementById('searchBtn');
    const cityInput = document.getElementById('cityInput');
    const loadingDiv = document.getElementById('loading');
    const errorDiv = document.getElementById('error');
    const weatherContent = document.getElementById('weatherContent');

    function showLoading(show) {
        loadingDiv.style.display = show ? 'block' : 'none';
    }

    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        weatherContent.style.display = 'none';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 4000);
    }

    function clearError() {
        errorDiv.style.display = 'none';
    }

    function getWeatherIconUrl(iconCode) {
        return `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
    }

    function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    async function fetchWeather(city) {
        if (!city.trim()) {
            showError('Please enter a city name');
            return;
        }

        clearError();
        showLoading(true);
        weatherContent.style.display = 'none';

        try {
            const response = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
            const result = await response.json();

            if (!response.ok || result.error) {
                showError(result.error || 'City not found. Please check the name.');
                showLoading(false);
                return;
            }

            displayWeather(result.data, result.cached);
        } catch (err) {
            showError('Network error. Please try again.');
            console.error(err);
        } finally {
            showLoading(false);
        }
    }

    function displayWeather(data, isCached) {
        // Current weather HTML
        const html = `
            <div class="weather-card">
                <div class="city-name">
                    <img src="${getWeatherIconUrl(data.icon)}" alt="weather icon">
                    <span>${data.city}, ${data.country}</span>
                </div>
                <div class="temp">${data.temp}°C</div>
                <div class="details">
                    <div class="detail-item">🌡️ Feels like: ${data.feels_like}°C</div>
                    <div class="detail-item">💧 Humidity: ${data.humidity}%</div>
                    <div class="detail-item">🌬️ Wind: ${data.wind_speed} m/s</div>
                    <div class="detail-item">☁️ ${data.condition}</div>
                </div>
                ${isCached ? '<div class="cached-badge">⚡ Cached (from recent search)</div>' : ''}
            </div>
            <div class="forecast-title">📅 5-Day Forecast</div>
            <div class="forecast-grid">
                ${data.forecast.map(day => `
                    <div class="forecast-day">
                        <div class="forecast-date">${formatDate(day.date)}</div>
                        <img src="${getWeatherIconUrl(day.icon)}" alt="forecast icon" style="width: 48px;">
                        <div class="forecast-temp">${day.temp}°C</div>
                        <div class="forecast-condition">${day.condition}</div>
                    </div>
                `).join('')}
            </div>
        `;

        weatherContent.innerHTML = html;
        weatherContent.style.display = 'block';
    }

    // Event listeners
    searchBtn.addEventListener('click', () => {
        fetchWeather(cityInput.value);
    });

    cityInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            fetchWeather(cityInput.value);
        }
    });

    // Optional: default city on load
    window.addEventListener('load', () => {
        fetchWeather('London');
    });
</script>
</body>
</html>
